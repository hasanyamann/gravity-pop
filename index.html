<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12172b">
<title>Gravity Pop</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #12172b;
    color: #fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #app { width: 100%; max-width: 440px; height: 100%; display: flex; flex-direction: column; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom); }

  #hud { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px 8px; gap: 8px; }
  .hud-box { background: rgba(255,255,255,.07); border-radius: 12px; padding: 6px 12px; text-align: center; min-width: 72px; }
  .hud-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #8b93b8; }
  .hud-value { font-size: 20px; font-weight: 700; }
  #movesVal.low { color: #ff5252; animation: pulse .8s infinite; }
  @keyframes pulse { 50% { opacity: .5; } }
  #goalChip { display: flex; align-items: center; justify-content: center; gap: 6px; }
  #goalDot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; }

  #boardWrap { position: relative; width: 100%; }
  canvas { display: block; width: 100%; border-radius: 16px; }

  #controls { display: flex; justify-content: center; gap: 40px; padding: 14px 0 10px; }
  .ctrl-btn {
    width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.1); color: #fff; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s, background .2s;
  }
  .ctrl-btn:active { transform: scale(.92); background: rgba(255,255,255,.22); }
  #hint { text-align: center; font-size: 13px; color: #8b93b8; min-height: 18px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(10,13,26,.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; padding: 20px; text-align: center;
  }
  .hidden { display: none !important; }
  h1 { font-size: 44px; margin-bottom: 6px; letter-spacing: -1px; }
  h1 .g1 { color: #40C4FF; } h1 .g2 { color: #FFD740; } h1 .g3 { color: #FF5252; }
  .subtitle { color: #8b93b8; margin-bottom: 34px; font-size: 15px; }
  .big-btn {
    background: linear-gradient(135deg, #40C4FF, #7C6BFF); color: #fff; border: none;
    font-size: 20px; font-weight: 700; padding: 15px 60px; border-radius: 40px;
    cursor: pointer; margin: 8px 0; min-width: 230px;
    transition: transform .1s;
  }
  .big-btn:active { transform: scale(.95); }
  .ghost-btn {
    background: rgba(255,255,255,.1); color: #fff; border: none; font-size: 16px;
    font-weight: 600; padding: 12px 40px; border-radius: 40px; cursor: pointer; margin: 6px 0; min-width: 230px;
  }
  .ghost-btn:active { transform: scale(.95); }
  #resultTitle { font-size: 34px; margin-bottom: 8px; }
  #stars { font-size: 44px; letter-spacing: 6px; margin: 10px 0 4px; }
  #stars .on { color: #FFD740; } #stars .off { color: rgba(255,255,255,.15); }
  #resultScore { color: #8b93b8; margin-bottom: 26px; }

  #levelGrid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
    width: 100%; max-width: 360px; max-height: 55vh; overflow-y: auto; padding: 4px; margin-bottom: 20px;
    touch-action: pan-y;
  }
  .lvl-btn {
    aspect-ratio: 1; border-radius: 14px; border: none; cursor: pointer;
    background: rgba(255,255,255,.1); color: #fff; font-size: 18px; font-weight: 700;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .lvl-btn .st { font-size: 10px; color: #FFD740; letter-spacing: 1px; }
  .lvl-btn.locked { opacity: .25; }
  .lvl-btn.current { outline: 2px solid #40C4FF; }

  #soundBtn { position: fixed; top: calc(10px + env(safe-area-inset-top)); right: 12px; z-index: 20;
    width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,.1);
    color: #fff; font-size: 19px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-box"><div class="hud-label">Level</div><div class="hud-value" id="levelVal">1</div></div>
    <div class="hud-box"><div class="hud-label">Goal</div><div class="hud-value" id="goalChip"><span id="goalDot"></span><span id="goalVal">0/0</span></div></div>
    <div class="hud-box"><div class="hud-label">Moves</div><div class="hud-value" id="movesVal">12</div></div>
  </div>
  <div id="boardWrap"><canvas id="cv"></canvas></div>
  <div id="hint"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btnCCW" aria-label="Rotate left">&#8634;</button>
    <button class="ctrl-btn" id="btnCW" aria-label="Rotate right">&#8635;</button>
  </div>
</div>

<button id="soundBtn">&#128266;</button>

<div id="menu" class="overlay">
  <h1><span class="g1">Gravity</span> <span class="g2">P</span><span class="g3">o</span><span class="g1">p</span></h1>
  <div class="subtitle">Rotate the board. Let colors fall. Pop!</div>
  <button class="big-btn" id="btnPlay">Play</button>
  <button class="ghost-btn" id="btnLevels">Levels</button>
</div>

<div id="levels" class="overlay hidden">
  <h1 style="font-size:28px;margin-bottom:18px;">Levels</h1>
  <div id="levelGrid"></div>
  <button class="ghost-btn" id="btnBack">Back</button>
</div>

<div id="result" class="overlay hidden">
  <div id="resultTitle">Level complete!</div>
  <div id="stars"></div>
  <div id="resultScore"></div>
  <button class="big-btn" id="btnNext">Next level</button>
  <button class="ghost-btn" id="btnRetry">Retry</button>
  <button class="ghost-btn" id="btnMenu">Menu</button>
</div>

<script>
'use strict';
// ---------- constants ----------
const COLORS = ['#FF5252','#40C4FF','#FFD740','#69F0AE','#B388FF','#FF9E43'];
const COLORS_DARK = ['#B03232','#2A87B3','#B39528','#46A876','#7B5FB3','#B36E2E'];
const SAVE_KEY = 'gravityPopSave';

// ---------- save / load ----------
let save = { unlocked: 1, stars: {}, sound: true };
try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (s && s.unlocked) save = s; } catch (e) {}
function persist() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {} }

// ---------- audio ----------
let actx = null;
function audio() {
  if (!save.sound) return null;
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, type, vol, when) {
  const a = audio(); if (!a) return;
  const t = a.currentTime + (when || 0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol || .15, t);
  g.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + dur + .05);
}
function sndRotate() { tone(180, .15, 'triangle', .1); }
function sndPop(combo) { tone(320 + combo * 90, .12, 'square', .12); tone(640 + combo * 90, .08, 'sine', .08); }
function sndLand() { tone(120, .06, 'sine', .06); }
function sndWin() { [523, 659, 784, 1047].forEach((f, i) => tone(f, .25, 'triangle', .14, i * .13)); }
function sndLose() { [330, 262, 196].forEach((f, i) => tone(f, .3, 'sawtooth', .08, i * .16)); }

// ---------- level config ----------
function levelConfig(n) {
  const size = n < 5 ? 6 : n < 15 ? 7 : 8;
  const colorCount = n < 8 ? 4 : n < 20 ? 5 : 6;
  const moves = Math.min(16, 11 + Math.floor(n / 5));
  const goalType = (n >= 3 && n % 3 === 0) ? 'color' : 'any';
  return { n, size, colorCount, moves, goalType };
}

// ---------- board helpers ----------
function findMatches(b) {
  const N = b.length, seen = b.map(row => row.map(() => false)), groups = [];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (!b[r][c] || seen[r][c]) continue;
    const col = b[r][c], stack = [[r, c]], grp = [];
    seen[r][c] = true;
    while (stack.length) {
      const [y, x] = stack.pop(); grp.push([y, x]);
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for (let i = 0; i < 4; i++) {
        const ny = y + dirs[i][0], nx = x + dirs[i][1];
        if (ny >= 0 && ny < N && nx >= 0 && nx < N && !seen[ny][nx] && b[ny][nx] === col) {
          seen[ny][nx] = true; stack.push([ny, nx]);
        }
      }
    }
    if (grp.length >= 3) groups.push(grp);
  }
  return groups;
}
function applyGravity(b) {
  const N = b.length, falls = [];
  for (let c = 0; c < N; c++) {
    let write = N - 1;
    for (let r = N - 1; r >= 0; r--) {
      if (b[r][c]) {
        if (write !== r) { b[write][c] = b[r][c]; b[r][c] = 0; falls.push({ from: r, to: write, col: c }); }
        write--;
      }
    }
  }
  return falls;
}
function rotateMatrix(b, dir) {
  const N = b.length, res = b.map(row => row.map(() => 0));
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (dir === 1) res[c][N - 1 - r] = b[r][c];
    else res[N - 1 - c][r] = b[r][c];
  }
  return res;
}
function generateBoard(cfg) {
  const N = cfg.size, total = Math.round(N * N * 0.78);
  const b = Array.from({ length: N }, () => Array(N).fill(0));
  const cells = [];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) cells.push([r, c]);
  for (let i = cells.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = cells[i]; cells[i] = cells[j]; cells[j] = t; }
  for (let i = 0; i < total; i++) b[cells[i][0]][cells[i][1]] = 1 + Math.floor(Math.random() * cfg.colorCount);
  applyGravity(b);
  let guard = 0;
  while (guard++ < 300) {
    const groups = findMatches(b);
    if (!groups.length) break;
    for (const grp of groups) {
      const [r, c] = grp[Math.floor(Math.random() * grp.length)];
      let nv = 1 + Math.floor(Math.random() * cfg.colorCount);
      if (nv === b[r][c]) nv = (nv % cfg.colorCount) + 1;
      b[r][c] = nv;
    }
  }
  return b;
}
function countBalls(b) { let n = 0; for (const row of b) for (const v of row) if (v) n++; return n; }
function countColor(b, col) { let n = 0; for (const row of b) for (const v of row) if (v === col) n++; return n; }

// ---------- game state ----------
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let board = [], cfg = null, level = 1;
let moves = 0, score = 0, goal = { type: 'any', color: 0, target: 0, progress: 0 };
let busy = false, playing = false, movedOnce = false;
let boardAngle = 0;           // radians, whole-board rotation during move
let offY = [], velY = [], popScale = {};
let particles = [], floats = [];
let cell = 0, pad = 8, dpr = 1, cssSize = 0;

function resize() {
  const wrap = document.getElementById('boardWrap');
  cssSize = Math.min(wrap.clientWidth, Math.floor(window.innerHeight * 0.62));
  dpr = window.devicePixelRatio || 1;
  cv.style.width = cssSize + 'px'; cv.style.height = cssSize + 'px';
  cv.width = Math.round(cssSize * dpr); cv.height = Math.round(cssSize * dpr);
  if (cfg) cell = (cssSize - pad * 2) / cfg.size;
}
window.addEventListener('resize', resize);

function startLevel(n) {
  level = n; cfg = levelConfig(n);
  board = generateBoard(cfg);
  moves = cfg.moves; score = 0;
  offY = board.map(row => row.map(() => 0));
  velY = board.map(row => row.map(() => 0));
  popScale = {}; particles = []; floats = []; boardAngle = 0;
  const total = countBalls(board);
  if (cfg.goalType === 'color') {
    let best = 1, bestN = 0;
    for (let col = 1; col <= cfg.colorCount; col++) { const k = countColor(board, col); if (k > bestN) { bestN = k; best = col; } }
    goal = { type: 'color', color: best, target: Math.max(6, Math.floor(bestN * 0.6)), progress: 0 };
  } else {
    goal = { type: 'any', color: 0, target: Math.round(total * Math.min(0.62, 0.42 + n * 0.012)), progress: 0 };
  }
  busy = false; playing = true; movedOnce = false;
  resize();
  updateHUD();
  document.getElementById('hint').textContent = n === 1 ? 'Swipe or tap a button to rotate the board' : '';
  show('game');
}

function updateHUD() {
  document.getElementById('levelVal').textContent = level;
  const mv = document.getElementById('movesVal');
  mv.textContent = moves;
  mv.classList.toggle('low', moves <= 3 && playing);
  const dot = document.getElementById('goalDot');
  if (goal.type === 'color') { dot.style.background = COLORS[goal.color - 1]; dot.style.display = 'inline-block'; }
  else { dot.style.display = 'none'; }
  document.getElementById('goalVal').textContent = Math.min(goal.progress, goal.target) + '/' + goal.target;
}

// ---------- animation engine ----------
let anims = [];
function runAnim(a) { anims.push(a); return new Promise(res => { a._done = res; }); }
function wait(ms) { return new Promise(res => setTimeout(res, ms)); }

let lastT = performance.now();
function loop(t) {
  const dt = Math.min(0.04, (t - lastT) / 1000); lastT = t;
  for (let i = anims.length - 1; i >= 0; i--) {
    if (!anims[i].update(dt)) { const a = anims[i]; anims.splice(i, 1); a._done(); }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += 900 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i]; f.y -= 40 * dt; f.life -= dt;
    if (f.life <= 0) floats.splice(i, 1);
  }
  draw();
  requestAnimationFrame(loop);
}

function draw() {
  if (!cfg) return;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssSize, cssSize);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  roundRect(0, 0, cssSize, cssSize, 16); ctx.fill();
  const N = cfg.size;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    ctx.fillStyle = 'rgba(255,255,255,0.045)';
    roundRect(pad + c * cell + 2, pad + r * cell + 2, cell - 4, cell - 4, Math.max(4, cell * 0.18));
    ctx.fill();
  }
  const cx = cssSize / 2, cy = cssSize / 2;
  const rotScale = 1 - 0.29 * Math.abs(Math.sin(boardAngle * 2));
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(boardAngle); ctx.scale(rotScale, rotScale); ctx.translate(-cx, -cy);
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const v = board[r][c]; if (!v) continue;
    const key = r + '_' + c;
    const sc = popScale[key] !== undefined ? popScale[key] : 1;
    if (sc <= 0) continue;
    const x = pad + c * cell + cell / 2;
    const y = pad + r * cell + cell / 2 + offY[r][c];
    drawBall(x, y, cell * 0.42 * sc, v);
  }
  ctx.restore();
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 0.6);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life / 0.5));
    ctx.font = '700 ' + f.size + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawBall(x, y, rad, v) {
  ctx.fillStyle = COLORS_DARK[v - 1];
  ctx.beginPath(); ctx.arc(x, y + rad * 0.08, rad, 0, 7); ctx.fill();
  ctx.fillStyle = COLORS[v - 1];
  ctx.beginPath(); ctx.arc(x, y, rad * 0.96, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(x - rad * 0.32, y - rad * 0.34, rad * 0.22, 0, 7); ctx.fill();
}

// ---------- move sequence ----------
async function animateRotation(dir) {
  sndRotate();
  const target = dir * Math.PI / 2, dur = 0.28;
  let t = 0;
  await runAnim({ update(dt) {
    t += dt; const p = Math.min(1, t / dur);
    const e = 1 - Math.pow(1 - p, 3);
    boardAngle = target * e;
    return p < 1;
  }});
  board = rotateMatrix(board, dir);
  boardAngle = 0;
}
async function animateGravity() {
  const falls = applyGravity(board);
  if (!falls.length) return;
  for (const f of falls) { offY[f.to][f.col] = -(f.to - f.from) * cell; velY[f.to][f.col] = 0; }
  const g = cell * 42;
  let landed = false;
  await runAnim({ update(dt) {
    let moving = false;
    for (let r = 0; r < cfg.size; r++) for (let c = 0; c < cfg.size; c++) {
      if (offY[r][c] < 0) {
        velY[r][c] += g * dt;
        offY[r][c] += velY[r][c] * dt;
        if (offY[r][c] >= 0) { offY[r][c] = 0; if (!landed) { landed = true; sndLand(); } }
        else moving = true;
      }
    }
    return moving;
  }});
}
async function animatePop(groups, combo) {
  const cells = [];
  for (const grp of groups) for (const rc of grp) cells.push(rc);
  sndPop(combo);
  if (navigator.vibrate) { try { navigator.vibrate(20); } catch (e) {} }
  let points = 0;
  for (const grp of groups) points += grp.length * 10 * combo;
  score += points;
  for (const [r, c] of cells) {
    const v = board[r][c];
    if (goal.type === 'any' || v === goal.color) goal.progress++;
    const x = pad + c * cell + cell / 2, y = pad + r * cell + cell / 2;
    for (let i = 0; i < 6; i++) {
      const a = Math.random() * Math.PI * 2, sp = cell * (1.5 + Math.random() * 2.5);
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - cell * 1.5, life: 0.6, color: COLORS[v - 1], size: cell * 0.09 });
    }
  }
  updateHUD();
  if (combo >= 2) {
    floats.push({ text: 'Combo x' + combo + '!', x: cssSize / 2, y: cssSize / 2, life: 0.9, size: Math.round(cssSize * 0.08), color: '#FFD740' });
  }
  const dur = 0.22; let t = 0;
  await runAnim({ update(dt) {
    t += dt; const p = Math.min(1, t / dur);
    for (const [r, c] of cells) popScale[r + '_' + c] = (1 - p) * 1.15;
    return p < 1;
  }});
  for (const [r, c] of cells) { board[r][c] = 0; delete popScale[r + '_' + c]; }
}
async function doMove(dir) {
  if (busy || !playing) return;
  busy = true; movedOnce = true;
  document.getElementById('hint').textContent = '';
  moves--; updateHUD();
  await animateRotation(dir);
  let combo = 0;
  while (true) {
    await animateGravity();
    const groups = findMatches(board);
    if (!groups.length) break;
    combo++;
    await animatePop(groups, combo);
  }
  checkEnd();
  busy = false;
}
function checkEnd() {
  if (!playing) return;
  const cleared = countBalls(board) === 0;
  if (goal.progress >= goal.target || cleared) {
    playing = false;
    if (cleared) { score += 500; goal.progress = goal.target; updateHUD(); }
    const ratio = moves / cfg.moves;
    const stars = ratio >= 0.3 ? 3 : ratio >= 0.1 ? 2 : 1;
    const prev = save.stars[level] || 0;
    if (stars > prev) save.stars[level] = stars;
    if (level + 1 > save.unlocked) save.unlocked = level + 1;
    persist();
    sndWin();
    setTimeout(() => showResult(true, stars), 600);
  } else if (moves <= 0) {
    playing = false;
    sndLose();
    setTimeout(() => showResult(false, 0), 600);
  }
}

// ---------- screens ----------
function show(id) {
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('levels').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  if (id !== 'game') document.getElementById(id).classList.remove('hidden');
}
function showResult(won, stars) {
  document.getElementById('resultTitle').textContent = won ? 'Level complete!' : 'Out of moves';
  let sh = '';
  for (let i = 1; i <= 3; i++) sh += '<span class="' + (i <= stars ? 'on' : 'off') + '">★</span>';
  document.getElementById('stars').innerHTML = won ? sh : '';
  document.getElementById('resultScore').textContent = 'Score: ' + score;
  document.getElementById('btnNext').style.display = won ? '' : 'none';
  show('result');
}
function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const maxShow = Math.max(15, save.unlocked + 4);
  for (let i = 1; i <= maxShow; i++) {
    const b = document.createElement('button');
    b.className = 'lvl-btn';
    const locked = i > save.unlocked;
    if (locked) b.classList.add('locked');
    if (i === save.unlocked) b.classList.add('current');
    const st = save.stars[i] || 0;
    b.innerHTML = i + (st ? '<span class="st">' + '★'.repeat(st) + '</span>' : '');
    if (!locked) b.addEventListener('click', () => startLevel(i));
    else b.disabled = true;
    grid.appendChild(b);
  }
}

// ---------- input ----------
document.getElementById('btnCCW').addEventListener('click', () => doMove(-1));
document.getElementById('btnCW').addEventListener('click', () => doMove(1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') doMove(-1);
  if (e.key === 'ArrowRight') doMove(1);
});
let touchX = null;
cv.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
cv.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX; touchX = null;
  if (dx > 30) doMove(1); else if (dx < -30) doMove(-1);
}, { passive: true });
let mouseX = null;
cv.addEventListener('mousedown', e => { mouseX = e.clientX; });
window.addEventListener('mouseup', e => {
  if (mouseX === null) return;
  const dx = e.clientX - mouseX; mouseX = null;
  if (dx > 30) doMove(1); else if (dx < -30) doMove(-1);
});

document.getElementById('btnPlay').addEventListener('click', () => { audio(); startLevel(save.unlocked); });
document.getElementById('btnLevels').addEventListener('click', () => { buildLevelGrid(); show('levels'); });
document.getElementById('btnBack').addEventListener('click', () => show('menu'));
document.getElementById('btnNext').addEventListener('click', () => startLevel(level + 1));
document.getElementById('btnRetry').addEventListener('click', () => startLevel(level));
document.getElementById('btnMenu').addEventListener('click', () => { playing = false; show('menu'); });
const soundBtn = document.getElementById('soundBtn');
function syncSoundBtn() { soundBtn.textContent = save.sound ? '🔊' : '🔇'; }
soundBtn.addEventListener('click', () => { save.sound = !save.sound; persist(); syncSoundBtn(); if (save.sound) audio(); });
syncSoundBtn();

// ---------- boot ----------
cfg = levelConfig(save.unlocked);
board = generateBoard(cfg);
offY = board.map(row => row.map(() => 0));
velY = board.map(row => row.map(() => 0));
resize();
updateHUD();
requestAnimationFrame(loop);

if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
</body>
</html>
